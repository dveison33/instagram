<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPeças - Distribuidora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #020617; color: #f1f5f9; }
        .pb-safe { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sticky-top-button {
            position: sticky;
            top: 4.5rem;
            z-index: 30;
        }
        .lucide {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="app" class="min-h-screen pb-24"></div>

    <script>
        // Dados do Sistema
        const PRODUTOS_MOCK = [
            { id: 1, nome: "Tela Frontal iPhone 11 - Original China", categoria: "Telas", preco: 189.90 },
            { id: 2, nome: "Bateria Samsung G532 J2 Prime", categoria: "Baterias", preco: 35.00 },
            { id: 3, nome: "Conector de Carga Moto G8 Play", categoria: "Conectores", preco: 12.50 },
            { id: 4, nome: "Tela Frontal Samsung A10 - Incell", categoria: "Telas", preco: 85.00 },
            { id: 5, nome: "Cabo Flex Power iPhone X", categoria: "Flex", preco: 25.00 },
            { id: 6, nome: "Tampa Traseira Xiaomi Note 8 - Azul", categoria: "Carcaças", preco: 45.00 },
            { id: 7, nome: "Kit de Ferramentas Precisão (24 em 1)", categoria: "Ferramentas", preco: 59.90 },
            { id: 8, nome: "Cola B7000 110ml", categoria: "Insumos", preco: 28.00 },
        ];

        const CATEGORIAS = ["Todos", "Telas", "Baterias", "Conectores", "Flex", "Carcaças", "Ferramentas", "Insumos"];

        // Estado Global
        let abaAtiva = 'catalogo';
        let busca = '';
        let categoriaSel = 'Todos';
        let carrinho = [];
        let nomeCliente = '';
        let pedidoFinalizado = null;
        let mostrarModalNome = false;

        function render() {
            const app = document.getElementById('app');
            
            if (abaAtiva === 'catalogo') app.innerHTML = renderCatalogo();
            else if (abaAtiva === 'carrinho') app.innerHTML = renderCarrinho();
            else if (abaAtiva === 'sucesso') app.innerHTML = renderSucesso();

            if (mostrarModalNome) {
                const modalDiv = document.createElement('div');
                modalDiv.innerHTML = renderModal();
                app.appendChild(modalDiv.firstElementChild);
            }

            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function setAba(aba) {
            abaAtiva = aba;
            render();
            window.scrollTo(0, 0);
        }

        // Corrigido: Agora apenas atualiza a variável e filtra os itens visualmente ou aguarda o Enter
        function handleBusca(e) {
            busca = e.target.value;
            if (e.key === 'Enter') {
                render();
            }
        }

        // Opcional: Para busca em tempo real sem perder o foco, filtramos apenas os cards
        function filtrarEmTempoReal(val) {
            busca = val;
            const cards = document.querySelectorAll('.produto-card');
            cards.forEach(card => {
                const nome = card.getAttribute('data-nome').toLowerCase();
                const categoria = card.getAttribute('data-categoria');
                const matchesBusca = nome.includes(val.toLowerCase());
                const matchesCat = categoriaSel === 'Todos' || categoria === categoriaSel;
                
                if (matchesBusca && matchesCat) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function setCategoria(cat) {
            categoriaSel = cat;
            render();
        }

        function adicionarAoCarrinho(id) {
            const produto = PRODUTOS_MOCK.find(p => p.id === id);
            const item = carrinho.find(i => i.id === id);
            if (item) item.qtd++;
            else carrinho.push({ ...produto, qtd: 1 });
            render();
        }

        function atualizarQtd(id, delta) {
            const item = carrinho.find(i => i.id === id);
            if (item) {
                item.qtd += delta;
                if (item.qtd <= 0) {
                    carrinho = carrinho.filter(i => i.id !== id);
                }
            }
            render();
        }

        function abrirModal() {
            mostrarModalNome = true;
            render();
        }

        function fecharModal() {
            mostrarModalNome = false;
            render();
        }

        function concluirPedido() {
            const nomeInput = document.getElementById('inputNome')?.value;
            if (!nomeInput || !nomeInput.trim()) {
                document.getElementById('inputNome').classList.add('border-red-500');
                return;
            }
            
            nomeCliente = nomeInput.trim().toUpperCase();
            pedidoFinalizado = {
                id: Math.floor(1000 + Math.random() * 9000),
                cliente: nomeCliente,
                itens: [...carrinho],
                total: carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0),
                data: new Date().toLocaleString('pt-PT')
            };
            
            carrinho = [];
            mostrarModalNome = false;
            abaAtiva = 'sucesso';
            render();
        }

        function enviarWhatsApp() {
            if (!pedidoFinalizado) return;
            let msg = `*NOVO PEDIDO: #${pedidoFinalizado.id}*\n*CLIENTE:* ${pedidoFinalizado.cliente}\n*DATA:* ${pedidoFinalizado.data}\n--------------------------\n`;
            pedidoFinalizado.itens.forEach(item => {
                msg += `• ${item.qtd}x ${item.nome} - R$ ${(item.preco * item.qtd).toFixed(2)}\n`;
            });
            msg += `--------------------------\n*TOTAL: R$ ${pedidoFinalizado.total.toFixed(2)}*`;
            window.open(`https://wa.me/5500000000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderHeader() {
            return `
            <header class="bg-slate-900 border-b border-orange-600/30 text-white sticky top-0 z-40 shadow-xl px-4 py-3">
                <div class="flex justify-between items-center max-w-xl mx-auto">
                    <div class="flex items-center gap-2">
                        <div class="bg-orange-600 p-1.5 rounded-lg flex items-center justify-center">
                            <i data-lucide="smartphone" class="w-5 h-5"></i>
                        </div>
                        <h1 class="text-lg font-black tracking-tight uppercase">Tech<span class="text-orange-500">Peças</span></h1>
                    </div>
                    ${abaAtiva === 'carrinho' ? `
                        <button onclick="setAba('catalogo')" class="text-xs font-bold flex items-center gap-1 bg-slate-800 text-orange-500 px-3 py-1.5 rounded-full border border-orange-600/20">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> VOLTAR
                        </button>
                    ` : ''}
                </div>
            </header>`;
        }

        function renderFloatingButton() {
            const total = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            const totalItens = carrinho.reduce((acc, i) => acc + i.qtd, 0);
            if (totalItens === 0 || abaAtiva !== 'catalogo') return '';
            return `
            <div class="sticky-top-button px-4 py-2 animate-in">
                <button onclick="setAba('carrinho')" class="w-full bg-orange-600 text-white py-4 px-6 rounded-2xl shadow-2xl shadow-orange-900/40 flex items-center justify-between border border-orange-400/20 active:scale-[0.98] transition-all">
                    <div class="flex items-center gap-3">
                        <div class="bg-white/20 p-2 rounded-xl flex items-center justify-center">
                            <i data-lucide="shopping-cart" class="w-5 h-5 text-white"></i>
                        </div>
                        <div class="text-left">
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-80 leading-none">Finalizar Pedido</p>
                            <p class="text-sm font-black">${totalItens} ${totalItens === 1 ? 'item' : 'itens'}</p>
                        </div>
                    </div>
                    <p class="text-lg font-black tracking-tight">R$ ${total.toFixed(2)}</p>
                </button>
            </div>`;
        }

        function renderNav() {
            const totalItens = carrinho.reduce((acc, i) => acc + i.qtd, 0);
            return `
            <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur-xl border-t border-slate-800 px-6 py-3 flex justify-around items-center z-50 pb-safe shadow-2xl">
                <button onclick="setAba('catalogo')" class="flex flex-col items-center gap-1 ${abaAtiva === 'catalogo' ? 'text-orange-500' : 'text-slate-600'}">
                    <i data-lucide="home" class="w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Peças</span>
                </button>
                <button onclick="setAba('carrinho')" class="flex flex-col items-center gap-1 relative ${abaAtiva === 'carrinho' ? 'text-orange-500' : 'text-slate-600'}">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Carrinho</span>
                    ${totalItens > 0 ? `<span class="absolute -top-1 -right-2 bg-orange-600 text-white text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-lg">${totalItens}</span>` : ''}
                </button>
            </nav>`;
        }

        function renderCatalogo() {
            const produtos = PRODUTOS_MOCK;
            return `
            ${renderHeader()}
            ${renderFloatingButton()}
            <main class="max-w-xl mx-auto p-4 animate-in">
                <div class="space-y-5">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                        <input type="text" placeholder="Procurar peça ou modelo..." value="${busca}" 
                            oninput="filtrarEmTempoReal(this.value)"
                            onkeydown="if(event.key === 'Enter') render()"
                            class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-900 border border-slate-800 text-white placeholder:text-slate-600 focus:ring-2 focus:ring-orange-600 outline-none transition-all text-sm">
                    </div>
                    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                        ${CATEGORIAS.map(cat => `
                            <button onclick="setCategoria('${cat}')" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all border-2 ${categoriaSel === cat ? 'bg-orange-600 border-orange-600 text-white shadow-lg shadow-orange-900/20' : 'bg-slate-900 border-slate-800 text-slate-400'}">
                                ${cat.toUpperCase()}
                            </button>
                        `).join('')}
                    </div>
                    <div id="lista-produtos" class="grid grid-cols-2 gap-3">
                        ${produtos.map(p => {
                            const isVisible = (categoriaSel === 'Todos' || p.categoria === categoriaSel) && p.nome.toLowerCase().includes(busca.toLowerCase());
                            return `
                            <div class="produto-card bg-slate-900 rounded-2xl p-3 shadow-md border border-slate-800 flex flex-col justify-between hover:border-orange-600/30 transition-all" 
                                 data-nome="${p.nome}" data-categoria="${p.categoria}" style="display: ${isVisible ? 'flex' : 'none'}">
                                <div>
                                    <div class="aspect-square bg-slate-950 rounded-xl flex items-center justify-center mb-3 border border-slate-800 text-slate-700">
                                        <i data-lucide="package" class="w-8 h-8"></i>
                                    </div>
                                    <span class="text-[9px] font-black text-orange-500 bg-orange-500/10 px-1.5 py-0.5 rounded uppercase tracking-tighter">${p.categoria}</span>
                                    <h3 class="font-bold text-slate-100 text-xs mt-1 leading-tight line-clamp-2">${p.nome}</h3>
                                </div>
                                <div class="mt-4 flex flex-col gap-3">
                                    <span class="text-base font-black text-white">R$ ${p.preco.toFixed(2)}</span>
                                    <button onclick="adicionarAoCarrinho(${p.id})" class="w-full bg-orange-600 text-white py-3 rounded-xl active:scale-95 flex items-center justify-center gap-2 font-black text-xs uppercase transition-transform shadow-lg shadow-orange-900/20">
                                        <i data-lucide="plus" class="w-4 h-4"></i> Adicionar
                                    </button>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            </main>
            ${renderNav()}`;
        }

        function renderCarrinho() {
            const total = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            const totalItens = carrinho.reduce((acc, i) => acc + i.qtd, 0);
            return `
            ${renderHeader()}
            <main class="max-w-xl mx-auto p-4 animate-in">
                <h2 class="text-xl font-black px-1 text-white uppercase tracking-tight mb-4">O Teu <span class="text-orange-500">Carrinho</span></h2>
                ${carrinho.length > 0 ? `
                    <div class="space-y-3">
                        ${carrinho.map(item => `
                            <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800 flex items-center gap-3">
                                <div class="w-14 h-14 bg-slate-950 rounded-xl flex items-center justify-center border border-slate-800 text-slate-600"><i data-lucide="package" class="w-5 h-5"></i></div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-slate-100 text-xs truncate">${item.nome}</h4>
                                    <p class="text-xs text-orange-500 font-bold">R$ ${item.preco.toFixed(2)}</p>
                                </div>
                                <div class="flex items-center bg-slate-800 rounded-xl p-1">
                                    <button onclick="atualizarQtd(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center text-slate-400"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                    <span class="w-8 text-center text-sm font-black text-white">${item.qtd}</span>
                                    <button onclick="atualizarQtd(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center text-slate-400"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        `).join('')}
                        <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl border border-slate-800 mt-6 relative overflow-hidden">
                            <div class="flex justify-between items-end">
                                <span class="text-sm font-medium text-slate-400 uppercase tracking-widest">TOTAL</span>
                                <span class="text-3xl font-black text-white">R$ ${total.toFixed(2)}</span>
                            </div>
                            <button onclick="abrirModal()" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black mt-6 flex items-center justify-center gap-3 shadow-xl shadow-orange-900/20 text-sm uppercase tracking-widest transition-transform active:scale-95">
                                CONTINUAR PEDIDO <i data-lucide="chevron-right" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                ` : `
                    <div class="text-center py-20 bg-slate-900 rounded-3xl border-2 border-dashed border-slate-800">
                        <i data-lucide="shopping-cart" class="w-10 h-10 mx-auto text-slate-800 mb-3"></i>
                        <p class="text-slate-500 font-bold uppercase text-[10px]">Vazio</p>
                    </div>
                `}
            </main>
            ${renderNav()}`;
        }

        function renderModal() {
            return `
            <div class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md animate-in">
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border border-slate-800">
                    <div class="flex flex-col items-center text-center space-y-6">
                        <div class="w-20 h-20 bg-orange-600/10 text-orange-500 rounded-3xl flex items-center justify-center border border-orange-600/20"><i data-lucide="store" class="w-10 h-10"></i></div>
                        <div class="space-y-1">
                            <h3 class="text-2xl font-black text-white uppercase tracking-tight">Identificação</h3>
                            <p class="text-slate-500 text-xs">Nome da sua loja ou técnico.</p>
                        </div>
                        <div class="w-full relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 w-5 h-5"></i>
                            <input type="text" id="inputNome" placeholder="NOME DA LOJA" 
                                onkeydown="if(event.key === 'Enter') concluirPedido()"
                                class="w-full pl-11 pr-4 py-5 rounded-2xl bg-slate-950 border border-slate-800 text-white focus:border-orange-600 outline-none font-black uppercase text-sm">
                        </div>
                        <div class="flex w-full gap-3 pt-2">
                            <button onclick="fecharModal()" class="flex-1 py-5 rounded-2xl font-black text-slate-500 bg-slate-800 text-[10px] uppercase tracking-widest">Sair</button>
                            <button onclick="concluirPedido()" class="flex-[2.5] py-5 rounded-2xl font-black text-white bg-orange-600 text-[11px] uppercase tracking-widest active:scale-95 transition-transform shadow-lg shadow-orange-900/20">Finalizar</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderSucesso() {
            return `
            <main class="max-w-xl mx-auto p-4 animate-in text-center pt-10">
                <div class="w-24 h-24 bg-orange-600 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl mb-8 shadow-orange-900/40"><i data-lucide="check-circle-2" class="w-12 h-12"></i></div>
                <h2 class="text-3xl font-black uppercase tracking-tight">Pronto!</h2>
                <p class="text-slate-400 text-sm mt-3">Olá, <span class="text-white font-bold">${pedidoFinalizado.cliente}</span>. Clique abaixo para enviar.</p>
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 text-left mt-10">
                   <p class="text-2xl font-black text-orange-500">R$ ${pedidoFinalizado.total.toFixed(2)}</p>
                </div>
                <button onclick="enviarWhatsApp()" class="w-full bg-[#25D366] text-white py-6 rounded-3xl font-black mt-10 flex items-center justify-center gap-3 active:scale-95 transition-transform text-base uppercase tracking-widest shadow-xl shadow-green-900/20">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> ENVIAR WHATSAPP
                </button>
            </main>`;
        }

        render();
    </script>
</body>
</html>
