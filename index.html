<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPeças - Distribuidora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #020617; color: #f1f5f9; }
        .pb-safe { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="app" class="min-h-screen pb-24">
        <!-- O conteúdo será injectado via JavaScript -->
    </div>

    <script>
        // Dados do Sistema
        const PRODUTOS_MOCK = [
            { id: 1, nome: "Tela Frontal iPhone 11 - Original China", categoria: "Telas", preco: 189.90 },
            { id: 2, nome: "Bateria Samsung G532 J2 Prime", categoria: "Baterias", preco: 35.00 },
            { id: 3, nome: "Conector de Carga Moto G8 Play", categoria: "Conectores", preco: 12.50 },
            { id: 4, nome: "Tela Frontal Samsung A10 - Incell", categoria: "Telas", preco: 85.00 },
            { id: 5, nome: "Cabo Flex Power iPhone X", categoria: "Flex", preco: 25.00 },
            { id: 6, nome: "Tampa Traseira Xiaomi Note 8 - Azul", categoria: "Carcaças", preco: 45.00 },
            { id: 7, nome: "Kit de Ferramentas Precisão (24 em 1)", categoria: "Ferramentas", preco: 59.90 },
            { id: 8, nome: "Cola B7000 110ml", categoria: "Insumos", preco: 28.00 },
        ];

        const CATEGORIAS = ["Todos", "Telas", "Baterias", "Conectores", "Flex", "Carcaças", "Ferramentas", "Insumos"];

        // Estado Global
        let abaAtiva = 'catalogo';
        let busca = '';
        let categoriaSel = 'Todos';
        let carrinho = [];
        let nomeCliente = '';
        let pedidoFinalizado = null;
        let mostrarModalNome = false;

        // Funções de Lógica
        function render() {
            const app = document.getElementById('app');
            
            if (abaAtiva === 'catalogo') app.innerHTML = renderCatalogo();
            else if (abaAtiva === 'carrinho') app.innerHTML = renderCarrinho();
            else if (abaAtiva === 'sucesso') app.innerHTML = renderSucesso();

            if (mostrarModalNome) app.innerHTML += renderModal();
        }

        function setAba(aba) {
            abaAtiva = aba;
            render();
        }

        function handleBusca(e) {
            busca = e.target.value;
            render();
        }

        function setCategoria(cat) {
            categoriaSel = cat;
            render();
        }

        function adicionarAoCarrinho(id) {
            const produto = PRODUTOS_MOCK.find(p => p.id === id);
            const item = carrinho.find(i => i.id === id);
            if (item) item.qtd++;
            else carrinho.push({ ...produto, qtd: 1 });
            render();
        }

        function atualizarQtd(id, delta) {
            const item = carrinho.find(i => i.id === id);
            if (item) {
                item.qtd += delta;
                if (item.qtd <= 0) {
                    carrinho = carrinho.filter(i => i.id !== id);
                }
            }
            render();
        }

        function abrirModal() {
            mostrarModalNome = true;
            render();
        }

        function fecharModal() {
            mostrarModalNome = false;
            render();
        }

        function concluirPedido() {
            const nomeInput = document.getElementById('inputNome')?.value;
            if (!nomeInput || !nomeInput.trim()) return;
            
            nomeCliente = nomeInput.trim().toUpperCase();
            pedidoFinalizado = {
                id: Math.floor(1000 + Math.random() * 9000),
                cliente: nomeCliente,
                itens: [...carrinho],
                total: carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0),
                data: new Date().toLocaleString('pt-PT')
            };
            
            carrinho = [];
            mostrarModalNome = false;
            abaAtiva = 'sucesso';
            render();
        }

        function enviarWhatsApp() {
            if (!pedidoFinalizado) return;

            let msg = `*NOVO PEDIDO: #${pedidoFinalizado.id}*\n`;
            msg += `*CLIENTE:* ${pedidoFinalizado.cliente}\n`;
            msg += `*DATA:* ${pedidoFinalizado.data}\n`;
            msg += `--------------------------\n`;
            
            pedidoFinalizado.itens.forEach(item => {
                msg += `• ${item.qtd}x ${item.nome} - R$ ${(item.preco * item.qtd).toFixed(2)}\n`;
            });

            msg += `--------------------------\n`;
            msg += `*TOTAL: R$ ${pedidoFinalizado.total.toFixed(2)}*`;

            const numero = "5500000000000"; // Substitua pelo número real
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Templates de Renderização
        function renderHeader() {
            return `
            <header class="bg-slate-900 border-b border-orange-600/30 text-white sticky top-0 z-40 shadow-xl px-4 py-3">
                <div class="flex justify-between items-center max-w-xl mx-auto">
                    <div class="flex items-center gap-2">
                        <div class="bg-orange-600 p-1.5 rounded-lg">
                            <i class="lucide-smartphone w-5 h-5"></i>
                        </div>
                        <h1 class="text-lg font-black tracking-tight uppercase">Tech<span class="text-orange-500">Peças</span></h1>
                    </div>
                    ${abaAtiva === 'carrinho' ? `
                        <button onclick="setAba('catalogo')" class="text-xs font-bold flex items-center gap-1 bg-slate-800 text-orange-500 px-3 py-1.5 rounded-full border border-orange-600/20">
                            <i class="lucide-arrow-left w-4 h-4"></i> VOLTAR
                        </button>
                    ` : ''}
                </div>
            </header>`;
        }

        function renderNav() {
            const totalItens = carrinho.reduce((acc, i) => acc + i.qtd, 0);
            return `
            <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur-xl border-t border-slate-800 px-6 py-3 flex justify-around items-center z-50 pb-safe shadow-2xl">
                <button onclick="setAba('catalogo')" class="flex flex-col items-center gap-1 ${abaAtiva === 'catalogo' ? 'text-orange-500' : 'text-slate-600'}">
                    <i class="lucide-home w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Peças</span>
                </button>
                <button onclick="setAba('carrinho')" class="flex flex-col items-center gap-1 relative ${abaAtiva === 'carrinho' ? 'text-orange-500' : 'text-slate-600'}">
                    <i class="lucide-shopping-cart w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Carrinho</span>
                    ${totalItens > 0 ? `<span class="absolute -top-1 -right-2 bg-orange-600 text-white text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-lg">${totalItens}</span>` : ''}
                </button>
            </nav>`;
        }

        function renderCatalogo() {
            const produtos = PRODUTOS_MOCK.filter(p => {
                const matchBusca = p.nome.toLowerCase().includes(busca.toLowerCase());
                const matchCat = categoriaSel === 'Todos' || p.categoria === categoriaSel;
                return matchBusca && matchCat;
            });

            return `
            ${renderHeader()}
            <main class="max-w-xl mx-auto p-4 animate-in">
                <div class="space-y-5">
                    <div class="relative">
                        <i class="lucide-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                        <input type="text" placeholder="Procurar peça ou modelo..." value="${busca}" oninput="handleBusca(event)"
                            class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-900 border border-slate-800 text-white placeholder:text-slate-600 focus:ring-2 focus:ring-orange-600 outline-none transition-all text-sm">
                    </div>

                    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                        ${CATEGORIAS.map(cat => `
                            <button onclick="setCategoria('${cat}')" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all border-2 ${categoriaSel === cat ? 'bg-orange-600 border-orange-600 text-white shadow-lg shadow-orange-900/20' : 'bg-slate-900 border-slate-800 text-slate-400'}">
                                ${cat.toUpperCase()}
                            </button>
                        `).join('')}
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        ${produtos.map(p => `
                            <div class="bg-slate-900 rounded-2xl p-3 shadow-md border border-slate-800 flex flex-col justify-between">
                                <div>
                                    <div class="aspect-square bg-slate-950 rounded-xl flex items-center justify-center mb-3 border border-slate-800">
                                        <i class="lucide-package w-8 h-8 text-slate-700"></i>
                                    </div>
                                    <span class="text-[9px] font-black text-orange-500 bg-orange-500/10 px-1.5 py-0.5 rounded uppercase tracking-tighter">${p.categoria}</span>
                                    <h3 class="font-bold text-slate-100 text-xs mt-1 leading-tight line-clamp-2">${p.nome}</h3>
                                </div>
                                <div class="mt-3 flex items-center justify-between">
                                    <span class="text-sm font-black text-white">R$ ${p.preco.toFixed(2)}</span>
                                    <button onclick="adicionarAoCarrinho(${p.id})" class="bg-orange-600 text-white p-2 rounded-lg active:scale-90 shadow-lg"><i class="lucide-plus w-4 h-4"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </main>
            ${renderNav()}`;
        }

        function renderCarrinho() {
            const total = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            const totalItens = carrinho.reduce((acc, i) => acc + i.qtd, 0);

            return `
            ${renderHeader()}
            <main class="max-w-xl mx-auto p-4 animate-in">
                <h2 class="text-xl font-black px-1 text-white uppercase tracking-tight mb-4">O Teu <span class="text-orange-500">Carrinho</span></h2>
                ${carrinho.length > 0 ? `
                    <div class="space-y-3">
                        ${carrinho.map(item => `
                            <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800 flex items-center gap-3">
                                <div class="w-14 h-14 bg-slate-950 rounded-xl flex items-center justify-center border border-slate-800 text-slate-600">
                                    <i class="lucide-package w-5 h-5"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-slate-100 text-xs truncate">${item.nome}</h4>
                                    <p class="text-xs text-orange-500 font-bold">R$ ${item.preco.toFixed(2)}</p>
                                </div>
                                <div class="flex items-center bg-slate-800 rounded-xl p-1">
                                    <button onclick="atualizarQtd(${item.id}, -1)" class="w-7 h-7 flex items-center justify-center text-slate-400"><i class="lucide-minus w-3 h-3"></i></button>
                                    <span class="w-6 text-center text-xs font-black text-white">${item.qtd}</span>
                                    <button onclick="atualizarQtd(${item.id}, 1)" class="w-7 h-7 flex items-center justify-center text-slate-400"><i class="lucide-plus w-3 h-3"></i></button>
                                </div>
                            </div>
                        `).join('')}

                        <div class="bg-slate-900 p-5 rounded-3xl text-white shadow-xl border border-slate-800 mt-6">
                            <div class="flex justify-between items-center text-slate-400 text-[10px] font-bold uppercase tracking-wider mb-1">
                                <span>${totalItens} ITENS SELECIONADOS</span>
                            </div>
                            <div class="flex justify-between items-end">
                                <span class="text-sm font-medium text-slate-400">SUBTOTAL</span>
                                <span class="text-2xl font-black text-white">R$ ${total.toFixed(2)}</span>
                            </div>
                            <button onclick="abrirModal()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black mt-5 active:scale-95 flex items-center justify-center gap-2">
                                CONTINUAR <i class="lucide-chevron-right w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                ` : `
                    <div class="text-center py-20 bg-slate-900 rounded-3xl border-2 border-dashed border-slate-800">
                        <i class="lucide-shopping-cart w-10 h-10 mx-auto text-slate-800 mb-3"></i>
                        <p class="text-slate-500 font-bold uppercase text-[10px]">O carrinho está vazio</p>
                        <button onclick="setAba('catalogo')" class="text-orange-500 font-black mt-4 underline text-xs">PROCURAR PEÇAS</button>
                    </div>
                `}
            </main>
            ${renderNav()}`;
        }

        function renderModal() {
            return `
            <div class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md animate-in">
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border border-slate-800">
                    <div class="flex flex-col items-center text-center space-y-5">
                        <div class="w-16 h-16 bg-orange-600/10 text-orange-500 rounded-2xl flex items-center justify-center border border-orange-600/20">
                            <i class="lucide-store w-8 h-8"></i>
                        </div>
                        <div class="space-y-1">
                            <h3 class="text-xl font-black text-white uppercase tracking-tight">Identificação</h3>
                            <p class="text-slate-500 text-xs font-medium">Nome da sua loja ou técnico responsável.</p>
                        </div>
                        <div class="w-full relative">
                            <i class="lucide-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 w-5 h-5"></i>
                            <input type="text" id="inputNome" placeholder="EX: LOJA DO JOÃO" oninput="render()"
                                class="w-full pl-11 pr-4 py-4 rounded-2xl bg-slate-950 border border-slate-800 text-white focus:border-orange-600 outline-none font-bold uppercase text-sm">
                        </div>
                        <div class="flex w-full gap-3 pt-2">
                            <button onclick="fecharModal()" class="flex-1 py-4 rounded-2xl font-black text-slate-500 bg-slate-800 text-[10px] uppercase">Sair</button>
                            <button onclick="concluirPedido()" class="flex-[2] py-4 rounded-2xl font-black text-white bg-orange-600 shadow-lg text-[10px] uppercase tracking-widest active:scale-95 transition-transform">Finalizar</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderSucesso() {
            return `
            <main class="max-w-xl mx-auto p-4 animate-in text-center pt-10">
                <div class="w-20 h-20 bg-orange-600 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl mb-6">
                    <i class="lucide-check-circle-2 w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-black uppercase tracking-tight">Pedido <span class="text-orange-500">Confirmado!</span></h2>
                <p class="text-slate-400 text-sm mt-2">Olá, <span class="text-white font-bold">${pedidoFinalizado.cliente}</span>. O seu pedido foi gerado com sucesso.</p>
                
                <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 text-left mt-8">
                   <p class="text-[10px] font-black text-orange-500 uppercase mb-3 tracking-widest">Resumo do Pedido</p>
                   <p class="text-xs font-bold text-white mb-1">ID: #${pedidoFinalizado.id}</p>
                   <p class="text-xs font-medium text-slate-400 mb-1">DATA: ${pedidoFinalizado.data}</p>
                   <p class="text-xs font-medium text-slate-400 mb-4">ITENS: ${pedidoFinalizado.itens.length}</p>
                   <div class="h-px bg-slate-800 w-full mb-4"></div>
                   <p class="text-lg font-black text-orange-500">TOTAL: R$ ${pedidoFinalizado.total.toFixed(2)}</p>
                </div>
                
                <button onclick="enviarWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black mt-8 shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    ENVIAR PARA WHATSAPP
                </button>
                <button onclick="setAba('catalogo')" class="w-full py-4 text-slate-500 font-bold uppercase text-[10px] tracking-widest mt-2">Fazer Novo Pedido</button>
            </main>`;
        }

        // Inicializar aplicação
        render();
    </script>
</body>
</html>
