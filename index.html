        let carrinho = [];

        let mostrarModalNome = false;

        // Funções de Lógica
        function render() {
            const app = document.getElementById('app');
            
            if (abaAtiva === 'catalogo') app.innerHTML = renderCatalogo();
            else if (abaAtiva === 'carrinho') app.innerHTML = renderCarrinho();
            else if (abaAtiva === 'sucesso') app.innerHTML = renderSucesso();

            if (mostrarModalNome) app.innerHTML += renderModal();

            // CRÍTICO: Disparar a criação dos ícones após o render do HTML
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function setAba(aba) {
            abaAtiva = aba;
            render();
            window.scrollTo(0, 0);
        }

        function handleBusca(e) {
            busca = e.target.value;
            render();
        }

        function setCategoria(cat) {
            categoriaSel = cat;
            render();
        }

        function adicionarAoCarrinho(id) {
            const produto = PRODUTOS_MOCK.find(p => p.id === id);
            const item = carrinho.find(i => i.id === id);
            if (item) item.qtd++;
            else carrinho.push({ ...produto, qtd: 1 });
            render();
        }

        function atualizarQtd(id, delta) {
            const item = carrinho.find(i => i.id === id);
            if (item) {
                item.qtd += delta;
                if (item.qtd <= 0) {
                    carrinho = carrinho.filter(i => i.id !== id);
                }
            }
            render();
        }

        function abrirModal() {
            mostrarModalNome = true;
            render();
        }

        function fecharModal() {
            mostrarModalNome = false;
            render();
        }

        function concluirPedido() {
            const nomeInput = document.getElementById('inputNome')?.value;
            if (!nomeInput || !nomeInput.trim()) return;
            
            nomeCliente = nomeInput.trim().toUpperCase();
            pedidoFinalizado = {
                id: Math.floor(1000 + Math.random() * 9000),
                cliente: nomeCliente,
                itens: [...carrinho],
                total: carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0),
                data: new Date().toLocaleString('pt-PT')
            };
            
            carrinho = [];
            mostrarModalNome = false;
            abaAtiva = 'sucesso';
            render();
        }

        function enviarWhatsApp() {
            if (!pedidoFinalizado) return;

            let msg = `*NOVO PEDIDO: #${pedidoFinalizado.id}*\n`;
            msg += `*CLIENTE:* ${pedidoFinalizado.cliente}\n`;
            msg += `*DATA:* ${pedidoFinalizado.data}\n`;
            msg += `--------------------------\n`;
            
            pedidoFinalizado.itens.forEach(item => {
                msg += `• ${item.qtd}x ${item.nome} - R$ ${(item.preco * item.qtd).toFixed(2)}\n`;
            });

            msg += `--------------------------\n`;
            msg += `*TOTAL: R$ ${pedidoFinalizado.total.toFixed(2)}*`;

            const numero = "5500000000000"; 
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, '_blank');
        }

                        </button>
                    ` : ''}
                </div>
            </header>`;

        function renderFloatingButton() {
            const total = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            const totalItens = carrinho.reduce((acc, i) => acc + i.qtd, 0);

            if (totalItens === 0 || abaAtiva !== 'catalogo') return '';

            return `
            <div class="sticky-top-button px-4 py-2 animate-in">
                <button onclick="setAba('carrinho')" class="w-full bg-orange-600 text-white py-4 px-6 rounded-2xl shadow-2xl shadow-orange-900/40 flex items-center justify-between border border-orange-400/20 active:scale-[0.98] transition-all">

                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black tracking-tight">R$ ${total.toFixed(2)}</p>
                    </div>
                </button>
            </div>
            `;
        }

        function renderCatalogo() {
            const produtos = PRODUTOS_MOCK.filter(p => {

            });

                                ${cat.toUpperCase()}
                            </button>
                        `).join('')}
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        ${produtos.map(p => `

                                <div>
                                    <div class="aspect-square bg-slate-950 rounded-xl flex items-center justify-center mb-3 border border-slate-800">
                                        <i data-lucide="package" class="w-8 h-8 text-slate-700"></i>
                                    </div>
                                    <span class="text-[9px] font-black text-orange-500 bg-orange-500/10 px-1.5 py-0.5 rounded uppercase tracking-tighter">${p.categoria}</span>
                                    <h3 class="font-bold text-slate-100 text-xs mt-1 leading-tight line-clamp-2">${p.nome}</h3>
                                </div>
                                <div class="mt-4 flex flex-col gap-3">
                                    <span class="text-base font-black text-white">R$ ${p.preco.toFixed(2)}</span>
                                    <button onclick="adicionarAoCarrinho(${p.id})" class="w-full bg-orange-600 text-white py-3 rounded-xl active:scale-95 shadow-lg shadow-orange-900/20 flex items-center justify-center gap-2 font-black text-xs uppercase transition-transform">

                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </main>
            ${renderNav()}`;
        }

        function renderCarrinho() {

                            <div class="absolute top-0 right-0 w-32 h-32 bg-orange-600/5 rounded-full -mr-16 -mt-16 blur-2xl"></div>
                            <div class="flex justify-between items-center text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">
                                <span>${totalItens} ITENS SELECIONADOS</span>
                            </div>
                            <div class="flex justify-between items-end">
                                <span class="text-sm font-medium text-slate-400">VALOR TOTAL</span>
                                <span class="text-3xl font-black text-white">R$ ${total.toFixed(2)}</span>
                            </div>
                            <button onclick="abrirModal()" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black mt-6 active:scale-95 flex items-center justify-center gap-3 shadow-xl shadow-orange-900/20 text-sm uppercase tracking-widest transition-transform">
                                CONTINUAR PEDIDO <i data-lucide="chevron-right" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                ` : `
                    <div class="text-center py-20 bg-slate-900 rounded-3xl border-2 border-dashed border-slate-800">
                        <i data-lucide="shopping-cart" class="w-10 h-10 mx-auto text-slate-800 mb-3"></i>
                        <p class="text-slate-500 font-bold uppercase text-[10px]">O carrinho está vazio</p>
                        <button onclick="setAba('catalogo')" class="text-orange-500 font-black mt-4 underline text-xs uppercase tracking-widest">Procurar Peças</button>
                    </div>
                `}
            </main>
            ${renderNav()}`;
        }

        function renderModal() {
            return `
            <div class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md animate-in">
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border border-slate-800">
                    <div class="flex flex-col items-center text-center space-y-6">
                        <div class="w-20 h-20 bg-orange-600/10 text-orange-500 rounded-3xl flex items-center justify-center border border-orange-600/20 shadow-inner">
                            <i data-lucide="store" class="w-10 h-10"></i>
                        </div>
                        <div class="space-y-1">
                            <h3 class="text-2xl font-black text-white uppercase tracking-tight">Identificação</h3>
                            <p class="text-slate-500 text-xs font-medium">Nome da sua loja ou técnico responsável.</p>
                        </div>
                        <div class="w-full relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 w-5 h-5"></i>
                            <input type="text" id="inputNome" placeholder="EX: LOJA DO JOÃO" oninput="render()"
                                class="w-full pl-11 pr-4 py-5 rounded-2xl bg-slate-950 border border-slate-800 text-white focus:border-orange-600 outline-none font-black uppercase text-sm shadow-inner transition-all">
                        </div>
                        <div class="flex w-full gap-3 pt-2">
                            <button onclick="fecharModal()" class="flex-1 py-5 rounded-2xl font-black text-slate-500 bg-slate-800 text-[10px] uppercase tracking-widest">Sair</button>
                            <button onclick="concluirPedido()" class="flex-[2.5] py-5 rounded-2xl font-black text-white bg-orange-600 shadow-xl shadow-orange-900/20 text-[11px] uppercase tracking-widest active:scale-95 transition-transform">Finalizar Agora</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderSucesso() {
            return `
            <main class="max-w-xl mx-auto p-4 animate-in text-center pt-10">
                <div class="w-24 h-24 bg-orange-600 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl mb-8 shadow-orange-900/40">
                    <i data-lucide="check-circle-2" class="w-12 h-12"></i>
                </div>
                <h2 class="text-3xl font-black uppercase tracking-tight">Pedido <span class="text-orange-500">Pronto!</span></h2>
                <p class="text-slate-400 text-sm mt-3 px-4">Olá, <span class="text-white font-bold">${pedidoFinalizado.cliente}</span>. O resumo do seu pedido foi gerado com sucesso.</p>
                
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 text-left mt-10 relative overflow-hidden">
                   <div class="absolute top-0 right-0 w-24 h-24 bg-orange-600/5 rounded-full -mr-12 -mt-12 blur-xl"></div>
                   <p class="text-[10px] font-black text-orange-500 uppercase mb-4 tracking-[0.2em]">Resumo dos Dados</p>
                   <p class="text-sm font-bold text-white mb-1 tracking-tight">ID: #${pedidoFinalizado.id}</p>
                   <p class="text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">${pedidoFinalizado.data}</p>
                   <p class="text-xs font-medium text-slate-400 mb-5">${pedidoFinalizado.itens.length} PRODUTOS NO TOTAL</p>
                   <div class="h-px bg-slate-800 w-full mb-5"></div>
                   <div class="flex justify-between items-center">
                       <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">VALOR FINAL</span>
                       <p class="text-2xl font-black text-orange-500">R$ ${pedidoFinalizado.total.toFixed(2)}</p>
                   </div>
                </div>
                
                <button onclick="enviarWhatsApp()" class="w-full bg-[#25D366] text-white py-6 rounded-3xl font-black mt-10 shadow-2xl shadow-green-900/20 flex items-center justify-center gap-3 active:scale-95 transition-transform text-base uppercase tracking-widest">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> ENVIAR PEDIDO
                </button>
                <button onclick="setAba('catalogo')" class="w-full py-6 text-slate-500 font-bold uppercase text-[10px] tracking-[0.3em] mt-2">Novo Orçamento</button>
            </main>`;
        }

        // Inicializar aplicação
        render();
    </script>
</body>
</html>
